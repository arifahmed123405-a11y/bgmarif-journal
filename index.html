<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bgmarif Trading Journal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 400px;
    margin: 80px auto;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.hidden { display: none; }

.error {
    color: red;
    margin-top: 10px;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #1e293b;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="container">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Sign In</button>

    <button id="gotoSignup">Create Account</button>
    <div id="loginError" class="error"></div>
</div>

<!-- SIGNUP -->
<div id="signupScreen" class="container hidden">
    <h2>Signup</h2>
    <input id="signupEmail" placeholder="Email">
    <input id="signupPassword" type="password" placeholder="Password">
    <button id="signupBtn">Create Account</button>

    <button id="gotoLogin">Back to Login</button>
    <div id="signupError" class="error"></div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">
    <div class="header">
        <span id="userEmail"></span>
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="container">
        <h3>Create Account</h3>
        <input id="accName" placeholder="Account Name">
        <input id="accBalance" placeholder="Starting Balance">
        <button id="createAcc">Create</button>

        <h3>Add Trade</h3>
        <input id="tradeAmount" placeholder="Profit/Loss ($)">
        <button id="addTrade">Add Trade</button>

        <h3>Trades</h3>
        <div id="trades"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
